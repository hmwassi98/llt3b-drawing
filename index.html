<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Avatar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="head">
  <div class="hair"></div>

  <div class="ear left"></div>
  <div class="ear right"></div>

  <div class="brows">
    <div class="brow"></div>
    <div class="brow"></div>
  </div>

  <div class="eyes">
    <div class="eye"></div>
    <div class="eye"></div>
  </div>

  <div class="nose"></div>

  <div class="blush left"></div>
  <div class="blush right"></div>

  <div class="mouth">
    <div class="tongue"></div>
  </div>

  <div class="beard"></div>
</div>

</body>
</html>
