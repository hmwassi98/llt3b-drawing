<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Emoji Illustrations</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="gallery">
  <section class="emoji-card">
    <h2>Happy</h2>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
        </div>
        <div class="brows">
          <div class="brow brow-left"></div>
          <div class="brow brow-right"></div>
        </div>
        <div class="blush blush-left"></div>
        <div class="blush blush-right"></div>
        <div class="mouth smile"></div>
      </div>
    </div>
  </section>

  <section class="emoji-card">
    <h2>Masked</h2>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left closed"></div>
          <div class="eye eye-right closed"></div>
        </div>
        <div class="brows">
          <div class="brow brow-left"></div>
          <div class="brow brow-right"></div>
        </div>
        <div class="face-mask">
          <div class="strap strap-top-left"></div>
          <div class="strap strap-top-right"></div>
          <div class="strap strap-bottom-left"></div>
          <div class="strap strap-bottom-right"></div>
          <div class="mask-fold fold-1"></div>
          <div class="mask-fold fold-2"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="emoji-card">
    <h2>Surprised</h2>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left wide"></div>
          <div class="eye eye-right wide"></div>
        </div>
        <div class="brows surprise-brows">
          <div class="brow brow-left lift"></div>
          <div class="brow brow-right lift"></div>
        </div>
        <div class="mouth open-mouth"></div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
